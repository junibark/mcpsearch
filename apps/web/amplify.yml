version: 1
applications:
  - frontend:
      phases:
        preBuild:
          commands:
            - npm install -g pnpm@9.15.0
            # Find the actual source directory
            - echo "CODEBUILD_SRC_DIR=$CODEBUILD_SRC_DIR"
            - cd $CODEBUILD_SRC_DIR && pnpm install --frozen-lockfile
        build:
          commands:
            - cd $CODEBUILD_SRC_DIR && pnpm --filter @mcpsearch/shared build
            - cd $CODEBUILD_SRC_DIR && pnpm --filter @mcpsearch/web build
            # Copy static assets
            - |
              cd $CODEBUILD_SRC_DIR/apps/web
              cp -r .next/static .next/standalone/apps/web/.next/
              cp -r public .next/standalone/apps/web/ 2>/dev/null || mkdir -p .next/standalone/apps/web/public
              echo "Static files copied successfully"
      artifacts:
        baseDirectory: .next/standalone
        files:
          - '**/*'
      cache:
        paths:
          - $CODEBUILD_SRC_DIR/node_modules/**/*
          - $CODEBUILD_SRC_DIR/apps/web/node_modules/**/*
          - $CODEBUILD_SRC_DIR/apps/web/.next/cache/**/*
    appRoot: apps/web
