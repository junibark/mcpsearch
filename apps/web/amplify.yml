version: 1
applications:
  - frontend:
      phases:
        preBuild:
          commands:
            - npm install -g pnpm@9.15.0
            - cd ../.. && pnpm install --frozen-lockfile
        build:
          commands:
            - cd ../.. && pnpm --filter @mcpsearch/shared build
            # Build and copy static assets in one command to preserve directory context
            - |
              cd ../.. && \
              pnpm --filter @mcpsearch/web build && \
              cd apps/web && \
              cp -r .next/static .next/standalone/apps/web/.next/ && \
              cp -r public .next/standalone/apps/web/ 2>/dev/null || mkdir -p .next/standalone/apps/web/public
      artifacts:
        baseDirectory: .next/standalone
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
          - ../../node_modules/**/*
          - .next/cache/**/*
    appRoot: apps/web
