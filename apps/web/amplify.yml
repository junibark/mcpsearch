version: 1
applications:
  - frontend:
      phases:
        preBuild:
          commands:
            - npm install -g pnpm@9.15.0
            - cd $CODEBUILD_SRC_DIR/mcpsearch && pnpm install --frozen-lockfile
        build:
          commands:
            - cd $CODEBUILD_SRC_DIR/mcpsearch && pnpm --filter @mcpsearch/shared build
            - cd $CODEBUILD_SRC_DIR/mcpsearch && pnpm --filter @mcpsearch/web build
            # Flatten monorepo standalone structure for Amplify SSR
            - |
              cd $CODEBUILD_SRC_DIR/mcpsearch/apps/web
              echo "=== Standalone structure before flatten ==="
              ls -la .next/standalone/
              ls -la .next/standalone/apps/web/ || true

              # Move app files from nested path to standalone root
              mv .next/standalone/apps/web/* .next/standalone/
              rm -rf .next/standalone/apps

              # Copy static files to the .next directory
              cp -r .next/static .next/standalone/.next/

              # Copy public folder
              cp -r public .next/standalone/ 2>/dev/null || mkdir -p .next/standalone/public

              echo "=== Standalone structure after flatten ==="
              ls -la .next/standalone/
              ls -la .next/standalone/.next/ || true
      artifacts:
        baseDirectory: .next/standalone
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
          - .next/cache/**/*
    appRoot: apps/web
