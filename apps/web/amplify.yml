version: 1
applications:
  - frontend:
      phases:
        preBuild:
          commands:
            - npm install -g pnpm@9.15.0
            - cd ../.. && pnpm install --frozen-lockfile
        build:
          commands:
            - cd ../.. && pnpm --filter @mcpsearch/shared build
            - cd ../.. && pnpm --filter @mcpsearch/web build
        postBuild:
          commands:
            # Copy static assets to standalone output
            - cp -r public .next/standalone/apps/web/ 2>/dev/null || true
            - cp -r .next/static .next/standalone/apps/web/.next/
      artifacts:
        baseDirectory: .next/standalone
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
          - ../../node_modules/**/*
          - .next/cache/**/*
    appRoot: apps/web
