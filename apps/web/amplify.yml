version: 1
applications:
  - frontend:
      phases:
        preBuild:
          commands:
            - cd ../..
            - corepack enable
            - corepack prepare pnpm@9.15.0 --activate
            - pnpm install --frozen-lockfile
        build:
          commands:
            - cd ../..
            - pnpm --filter @mcpsearch/shared build
            - pnpm --filter @mcpsearch/web build
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        paths:
          - ../../node_modules/**/*
          - ../../apps/web/node_modules/**/*
          - ../../packages/shared/node_modules/**/*
    appRoot: apps/web
