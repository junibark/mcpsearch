version: 1
applications:
  - frontend:
      phases:
        preBuild:
          commands:
            - npm install -g pnpm@9.15.0
            - cd $CODEBUILD_SRC_DIR/mcpsearch && pnpm install --frozen-lockfile
        build:
          commands:
            - cd $CODEBUILD_SRC_DIR/mcpsearch && pnpm --filter @mcpsearch/shared build
            - cd $CODEBUILD_SRC_DIR/mcpsearch && pnpm --filter @mcpsearch/web build
            # Flatten monorepo standalone structure for Amplify SSR
            - |
              cd $CODEBUILD_SRC_DIR/mcpsearch/apps/web
              echo "=== Before flatten ==="
              ls -la .next/standalone/
              echo "=== Inside apps/web ==="
              ls -la .next/standalone/apps/web/
              echo "=== .next server folder ==="
              ls -la .next/standalone/apps/web/.next/ || true

              # Move app files from nested path to standalone root
              # Use cp -a to preserve directory structure, then cleanup
              cp -a .next/standalone/apps/web/. .next/standalone/
              rm -rf .next/standalone/apps

              # Add static files to the .next/static/ directory
              mkdir -p .next/standalone/.next/static
              cp -r .next/static/* .next/standalone/.next/static/

              # Copy public folder
              cp -r public .next/standalone/ 2>/dev/null || mkdir -p .next/standalone/public

              # Copy required-server-files.json (required by Amplify SSR)
              cp .next/required-server-files.json .next/standalone/

              echo "=== After flatten ==="
              ls -la .next/standalone/
              echo "=== .next contents ==="
              ls -la .next/standalone/.next/
              echo "=== .next/server contents ==="
              ls -la .next/standalone/.next/server/ || echo "No server folder"
      artifacts:
        baseDirectory: .next/standalone
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
          - .next/cache/**/*
    appRoot: apps/web
