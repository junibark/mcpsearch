version: 1
applications:
  - frontend:
      phases:
        preBuild:
          commands:
            - npm install -g pnpm@9.15.0
            - cd ../.. && pnpm install --frozen-lockfile
        build:
          commands:
            - cd ../.. && pnpm --filter @mcpsearch/shared build
            # Build web app
            - cd ../.. && pnpm --filter @mcpsearch/web build
            # Find and copy static assets using absolute paths
            - |
              WEB_DIR=$(pwd)
              echo "Current dir: $WEB_DIR"
              ls -la "$WEB_DIR/.next/" || echo "No .next in current dir"
              MONO_ROOT=$(cd ../.. && pwd)
              echo "Mono root: $MONO_ROOT"
              ls -la "$MONO_ROOT/apps/web/.next/" || echo "Checking monorepo path"
              if [ -d "$MONO_ROOT/apps/web/.next/standalone" ]; then
                cp -r "$MONO_ROOT/apps/web/.next/static" "$MONO_ROOT/apps/web/.next/standalone/apps/web/.next/"
                cp -r "$MONO_ROOT/apps/web/public" "$MONO_ROOT/apps/web/.next/standalone/apps/web/" 2>/dev/null || mkdir -p "$MONO_ROOT/apps/web/.next/standalone/apps/web/public"
              fi
      artifacts:
        baseDirectory: .next/standalone
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
          - ../../node_modules/**/*
          - .next/cache/**/*
    appRoot: apps/web
