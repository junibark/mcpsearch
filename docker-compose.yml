# MCPSearch Local Development
# Docker Compose configuration

services:
  # ============================================
  # LocalStack (AWS services emulation)
  # ============================================
  localstack:
    image: localstack/localstack:latest
    ports:
      - "4566:4566"
      - "4510-4559:4510-4559"
    environment:
      - SERVICES=dynamodb,s3,sqs,sns,secretsmanager
      - DEBUG=0
      - DOCKER_HOST=unix:///var/run/docker.sock
      - PERSISTENCE=1
    volumes:
      - localstack_data:/var/lib/localstack
      - /var/run/docker.sock:/var/run/docker.sock

  # ============================================
  # Redis (cache)
  # ============================================
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  # ============================================
  # OpenSearch
  # ============================================
  opensearch:
    image: opensearchproject/opensearch:2.11.0
    ports:
      - "9200:9200"
      - "9600:9600"
    environment:
      - discovery.type=single-node
      - DISABLE_SECURITY_PLUGIN=true
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - opensearch_data:/usr/share/opensearch/data

  # ============================================
  # API Service
  # ============================================
  api:
    build:
      context: .
      dockerfile: infrastructure/docker/api.Dockerfile
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=development
      - PORT=8080
      - AWS_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - DYNAMODB_ENDPOINT=http://localstack:4566
      - DYNAMODB_TABLE_NAME=mcp-search-dev
      - S3_PACKAGES_BUCKET=mcp-search-packages-dev
      - REDIS_URL=redis://redis:6379
      - OPENSEARCH_ENDPOINT=http://opensearch:9200
    depends_on:
      - localstack
      - redis
      - opensearch
    develop:
      watch:
        - action: rebuild
          path: ./apps/api
        - action: rebuild
          path: ./packages/shared

  # ============================================
  # Setup (init script)
  # ============================================
  setup:
    image: amazon/aws-cli:latest
    depends_on:
      - localstack
    entrypoint: /bin/sh
    command:
      - -c
      - |
        sleep 5
        echo "Creating DynamoDB table..."
        aws --endpoint-url=http://localstack:4566 dynamodb create-table \
          --table-name mcp-search-dev \
          --attribute-definitions \
            AttributeName=PK,AttributeType=S \
            AttributeName=SK,AttributeType=S \
            AttributeName=GSI1PK,AttributeType=S \
            AttributeName=GSI1SK,AttributeType=S \
          --key-schema \
            AttributeName=PK,KeyType=HASH \
            AttributeName=SK,KeyType=RANGE \
          --global-secondary-indexes \
            '[{"IndexName":"GSI1","KeySchema":[{"AttributeName":"GSI1PK","KeyType":"HASH"},{"AttributeName":"GSI1SK","KeyType":"RANGE"}],"Projection":{"ProjectionType":"ALL"}}]' \
          --billing-mode PAY_PER_REQUEST \
          --region us-east-1 || true

        echo "Creating S3 buckets..."
        aws --endpoint-url=http://localstack:4566 s3 mb s3://mcp-search-packages-dev --region us-east-1 || true
        aws --endpoint-url=http://localstack:4566 s3 mb s3://mcp-search-assets-dev --region us-east-1 || true

        echo "Setup complete!"
    environment:
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_DEFAULT_REGION=us-east-1

volumes:
  localstack_data:
  redis_data:
  opensearch_data:
