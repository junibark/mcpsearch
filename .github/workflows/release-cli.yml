name: Release CLI

on:
  push:
    tags:
      - 'cli-v*'

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9.15.0'

jobs:
  # ============================================
  # Build Binaries
  # ============================================
  build:
    name: Build - ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: darwin-x64
            arch: x64
          - os: macos-latest
            target: darwin-arm64
            arch: arm64
          - os: ubuntu-latest
            target: linux-x64
            arch: x64
          - os: ubuntu-latest
            target: linux-arm64
            arch: arm64
          - os: windows-latest
            target: win32-x64
            arch: x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build CLI
        run: pnpm --filter @mcpsearch/cli build

      - name: Package binary
        run: |
          cd packages/cli
          npx pkg dist/index.js \
            --target node20-${{ matrix.target }} \
            --output mcp-${{ matrix.target }}${{ matrix.os == 'windows-latest' && '.exe' || '' }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mcp-${{ matrix.target }}
          path: packages/cli/mcp-${{ matrix.target }}*

  # ============================================
  # Create Release
  # ============================================
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate checksums
        run: |
          cd artifacts
          find . -type f -name 'mcp-*' -exec sha256sum {} \; > checksums.txt
          cat checksums.txt

      - name: Get version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/cli-v}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: CLI v${{ steps.version.outputs.version }}
          draft: true
          prerelease: ${{ contains(github.ref, 'beta') || contains(github.ref, 'alpha') }}
          generate_release_notes: true
          files: |
            artifacts/mcp-*/mcp-*
            artifacts/checksums.txt

  # ============================================
  # Publish to npm
  # ============================================
  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: [release]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm --filter @mcpsearch/cli build

      - name: Publish
        run: pnpm --filter @mcpsearch/cli publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ============================================
  # Update Homebrew
  # ============================================
  update-homebrew:
    name: Update Homebrew Formula
    runs-on: ubuntu-latest
    needs: [release]
    steps:
      - name: Checkout homebrew-tap
        uses: actions/checkout@v4
        with:
          repository: mcpsearch/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Get version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/cli-v}" >> $GITHUB_OUTPUT

      - name: Update formula
        run: |
          cat > Formula/mcp.rb << 'EOF'
          class Mcp < Formula
            desc "MCPSearch CLI - Discover and install MCP servers"
            homepage "https://mcpsearch.com"
            version "${{ steps.version.outputs.version }}"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/mcpsearch/mcpsearch/releases/download/cli-v${{ steps.version.outputs.version }}/mcp-darwin-arm64"
                sha256 "PLACEHOLDER_ARM64"
              else
                url "https://github.com/mcpsearch/mcpsearch/releases/download/cli-v${{ steps.version.outputs.version }}/mcp-darwin-x64"
                sha256 "PLACEHOLDER_X64"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "https://github.com/mcpsearch/mcpsearch/releases/download/cli-v${{ steps.version.outputs.version }}/mcp-linux-arm64"
                sha256 "PLACEHOLDER_ARM64"
              else
                url "https://github.com/mcpsearch/mcpsearch/releases/download/cli-v${{ steps.version.outputs.version }}/mcp-linux-x64"
                sha256 "PLACEHOLDER_X64"
              end
            end

            def install
              bin.install "mcp-#{OS.kernel_name.downcase}-#{Hardware::CPU.arch}" => "mcp"
            end

            test do
              system "#{bin}/mcp", "--version"
            end
          end
          EOF

      - name: Commit and push
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add Formula/mcp.rb
          git commit -m "Update mcp to ${{ steps.version.outputs.version }}"
          git push

  # ============================================
  # Upload to S3
  # ============================================
  upload-s3:
    name: Upload to S3
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Get version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/cli-v}" >> $GITHUB_OUTPUT

      - name: Upload to S3
        run: |
          # Upload versioned files
          aws s3 sync artifacts/ s3://mcp-search-cli-releases/v${{ steps.version.outputs.version }}/ \
            --exclude "*" \
            --include "*/mcp-*"

          # Update latest
          aws s3 sync artifacts/ s3://mcp-search-cli-releases/latest/ \
            --exclude "*" \
            --include "*/mcp-*"

          # Create version file
          echo '{"version": "${{ steps.version.outputs.version }}", "released": "'$(date -u +%Y-%m-%dT%H:%M:%SZ)'"}' \
            > version.json
          aws s3 cp version.json s3://mcp-search-cli-releases/latest/version.json

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLI_CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/latest/*"
